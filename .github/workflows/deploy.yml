name: Whogohost Deploy Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    name: Run Verification Tests
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv (Backend)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Build Check
        run: |
          cd frontend
          npm install
          npm run build

      - name: Backend Sync Check
        run: |
          cd backend
          uv sync

  deploy:
    name: Deploy to Whogohost
    runs-on: ubuntu-latest
    needs: [tests]
    # Deploy only on push or manual trigger for the main branch
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.WHOGOHOST_SSH_PORT || '22' }} -H ${{ secrets.WHOGOHOST_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check SSH Connectivity
        run: |
          echo "Testing connectivity to ${{ secrets.WHOGOHOST_SSH_HOST }} on port ${{ secrets.WHOGOHOST_SSH_PORT || '22' }}..."
          nc -zv -w 5 ${{ secrets.WHOGOHOST_SSH_HOST }} ${{ secrets.WHOGOHOST_SSH_PORT || '22' }} || echo "⚠️ Warning: Cannot reach host. Deployment may fail."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 30m
          debug: true
          script: |
            set -e

            echo "Starting deployment in /home/forahiao/public_html/auramed"

            cd /home/forahiao/public_html/auramed

            # Ensure we're on the correct branch
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Backend deployment steps
            echo "Updating Backend (uv)..."
            cd backend
            # This ensures your new packages (like pydantic-settings) are installed
            uv sync
            cd ..

            # Frontend deployment steps
            echo "Building Frontend (Vite)..."
            cd frontend
            # This ensures your frontend fixes actually get built
            npm install
            npm run build
            cd ..

            # Automated Database Migrations
            echo "Populating Pharmacy Data..."
            cd backend && uv run python populate_pharmacy_data.py && cd ..

            # Restart the backend service
            echo "Restarting AuraMed server..."
            # Using PM2 to restart your app automatically
            pm2 restart auramed || echo "PM2 not found. Please restart your server manually."

            echo "Deployment completed successfully!"

            # Show deployment info
            echo ""
            echo "Deployment Information:"
            echo "   Branch: main"
            echo "   Commit: $(git rev-parse --short HEAD)"
            echo "   Date: $(date)"
