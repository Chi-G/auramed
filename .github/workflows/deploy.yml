name: Whogohost Deploy Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 1. Build Frontend on GitHub (where Node works)
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 2. Upload the built files (dist) to Whogohost
      - name: Upload Frontend to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/home/forahiao/public_html/auramed/"
          strip_components: 2

      # 3. Handle Backend tasks via SSH
      - name: Backend Tasks via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.WHOGOHOST_SSH_HOST }}
          username: ${{ secrets.WHOGOHOST_SSH_USER }}
          port: ${{ secrets.WHOGOHOST_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/forahiao/public_html/auramed

            # Sync backend code
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Backend setup
            export UV_CONCURRENT_DOWNLOADS=1
            export RAYON_NUM_THREADS=1
            cd backend
            uv sync

            # 1. NEW: Create Tables and Default Users
            # This fixes the "Table doesn't exist" error
            uv run python -m app.initial_data

            # 2. Populate Pharmacy Data
            uv run python populate_pharmacy_data.py

            # Restart
            pm2 restart auramed || echo "Manual restart required"
